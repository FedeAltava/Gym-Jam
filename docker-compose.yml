services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymjam}
      POSTGRES_USER: ${POSTGRES_USER:-gymjam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymjam_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymjam}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gymjam

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gymjam}:${POSTGRES_PASSWORD:-gymjam_secret}@postgres:5432/${POSTGRES_DB:-gymjam}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gymjam

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gymjam

volumes:
  postgres_data:

networks:
  gymjam:
    driver: bridge
